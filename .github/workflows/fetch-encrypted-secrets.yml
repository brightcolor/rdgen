name: Generate Encrypted Config

# Liest alle Einstellungen aus bcrustdesk.json (im Repo-Root).
# Sensible Felder (Server, Key, Passwort) werden durch GitHub Secrets
# überschrieben – nie im Code sichtbar.

on:
  workflow_call:
    inputs:
      zip_url_json:
        description: 'Wird ignoriert – Config kommt aus bcrustdesk.json'
        required: false
        type: string
        default: ''

jobs:
  generate-config:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Abhaengigkeiten installieren
        run: pip install pyzipper --quiet

      - name: secrets.json aus bcrustdesk.json + GitHub Secrets generieren
        env:
          RUSTDESK_SERVER:   ${{ secrets.RUSTDESK_SERVER }}
          RUSTDESK_KEY:      ${{ secrets.RUSTDESK_KEY }}
          RUSTDESK_PASSWORD: ${{ secrets.RUSTDESK_PASSWORD }}
        run: |
          python3 - <<'PYEOF'
          import json, base64, os

          # ── bcrustdesk.json lesen ────────────────────────────────
          with open('bcrustdesk.json', 'r', encoding='utf-8') as f:
              cfg = json.load(f)

          # ── Sensible Werte aus GitHub Secrets (überschreiben JSON) ─
          server   = os.environ.get('RUSTDESK_SERVER', '').strip()
          key      = os.environ.get('RUSTDESK_KEY', '').strip()
          password = os.environ.get('RUSTDESK_PASSWORD', '').strip()

          if not server:
              raise ValueError("GitHub Secret RUSTDESK_SERVER ist nicht gesetzt!")
          if not password:
              raise ValueError("GitHub Secret RUSTDESK_PASSWORD ist nicht gesetzt!")

          # ── Hilfsfunktionen ─────────────────────────────────────
          def is_on(val, default='off'):
              if isinstance(val, bool): return val
              return str(val).lower() in ('on', 'true', '1', 'yes')

          def to_yn(val, default=False):
              return 'Y' if is_on(val, default) else 'N'

          def to_str(val):
              return str(val).lower() if isinstance(val, bool) else str(val)

          # ── Felder aus JSON extrahieren ──────────────────────────
          app_name    = cfg.get('appname', 'RemoteSupport')
          filename    = cfg.get('exename', app_name.lower().replace(' ', '-'))
          compname    = cfg.get('compname', '')
          url_link    = cfg.get('urlLink', '')
          dl_link     = cfg.get('downloadLink', '')
          theme       = cfg.get('theme', 'system')
          theme_doro  = cfg.get('themeDorO', 'default')
          perm_doro   = cfg.get('permissionsDorO', 'default')
          perm_type   = cfg.get('permissionsType', 'custom')
          direction   = cfg.get('direction', 'both')
          installation = cfg.get('installation', 'installationN')
          settings    = cfg.get('settings', 'settingsN')
          delay_fix   = cfg.get('delayFix', 'off')
          deny_lan    = cfg.get('denyLan', False)
          auto_close  = cfg.get('autoClose', False)
          hide_cm     = cfg.get('hidecm', False)
          rmt_modi    = cfg.get('enableRemoteModi', False)
          cycle_mon   = cfg.get('cycleMonitor', False)
          x_offline   = cfg.get('xOffline', False)
          rm_notif    = cfg.get('removeNewVersionNotif', False)
          rm_wallp    = cfg.get('removeWallpaper', 'off')
          dir_ip      = cfg.get('enableDirectIP', 'off')
          icon_b64    = cfg.get('iconbase64', '')
          logo_b64    = cfg.get('logobase64', '')
          priv_b64    = cfg.get('privacybase64', '')

          # ── API-Server: aus Secret ableiten ──────────────────────
          api_json = cfg.get('apiServer', '')
          api_server = f"https://{server}:21114" if not api_json or api_json in ('api', 'API') else api_json

          # ── Verbindungstyp mappen ────────────────────────────────
          conn_map = {'both': 'Both', 'incoming': 'Incoming', 'outgoing': 'Outgoing'}
          conn_type = conn_map.get(direction.lower(), 'Both')

          # ── Authentifizierungsmethode mappen ─────────────────────
          pass_mode = cfg.get('passApproveMode', 'password-click')
          if pass_mode in ('password-click', 'permanent'):
              ver_method = 'use-permanent-password'
          elif pass_mode in ('password-both', 'both'):
              ver_method = 'use-both-passwords'
          else:
              ver_method = 'use-permanent-password'

          # ── Feature-Flags ────────────────────────────────────────
          feat = {
              'keyboard':       is_on(cfg.get('enableKeyboard',      'on')),
              'clipboard':      is_on(cfg.get('enableClipboard',      'on')),
              'file-transfer':  is_on(cfg.get('enableFileTransfer',   'on')),
              'audio':          is_on(cfg.get('enableAudio',          'on')),
              'tunnel':         is_on(cfg.get('enableTCP',            'on')),
              'remote-restart': is_on(cfg.get('enableRemoteRestart',  'on')),
              'record-session': is_on(cfg.get('enableRecording',      'on')),
              'block-input':    is_on(cfg.get('enableBlockingInput',  'on')),
          }

          # ── custom-JSON (base64) – vom Generator für Einstellungen genutzt ─
          custom = {
              "conn-type":             conn_type,
              "verification-method":   ver_method,
              "access-mode":           "full",
              "enable-lan-discovery":  'N' if deny_lan else 'Y',
              "password":              password,
              "allow-auto-disconnect": to_yn(auto_close),
              "default-settings": {
                  f"enable-{k}": v for k, v in feat.items()
              },
              "override-settings": {}
          }
          custom_b64 = base64.b64encode(json.dumps(custom).encode()).decode()

          # ── Vollstaendiges secrets.json ──────────────────────────
          # Enthaelt alle Felder, die der Generator per decrypt-secrets als
          # Umgebungsvariablen braucht (Feldnamen exakt wie rdgen sie erwartet).
          secrets_data = {
              # Server
              "server":                server,
              "key":                   key,
              "apiServer":             api_server,

              # App-Identitaet
              "app-name":              app_name,   # Standard rdgen-Feld
              "appname":               app_name,   # Alternativname im Generator
              "filename":              filename,
              "exename":               filename,

              # Branding
              "compname":              compname,
              "urlLink":               url_link,
              "downloadLink":          dl_link,
              "iconbase64":            icon_b64,
              "logobase64":            logo_b64,
              "privacybase64":         priv_b64,

              # Design
              "theme":                 theme,
              "allow-darktheme":       "Y",
              "themeDorO":             theme_doro,

              # Zugriff & Sicherheit
              "password":              password,
              "verification-method":   ver_method,
              "access-mode":           "full",
              "enable-lan-discovery":  'N' if deny_lan else 'Y',
              "conn-type":             conn_type,
              "direction":             direction,
              "direct-server":         to_yn(dir_ip),
              "enableDirectIP":        to_str(is_on(dir_ip)),
              "allow-auto-disconnect": to_yn(auto_close),
              "autoClose":             to_str(auto_close),
              "denyLan":               to_str(deny_lan),

              # Berechtigungen
              "permissionsDorO":       perm_doro,
              "permissionsType":       perm_type,
              "installation":          installation,
              "settings":              settings,

              # Feature-Flags (Standard-Keys fuer den Generator)
              "enable-keyboard":       to_str(feat['keyboard']),
              "enable-clipboard":      to_str(feat['clipboard']),
              "enable-file-transfer":  to_str(feat['file-transfer']),
              "enable-audio":          to_str(feat['audio']),
              "enable-tunnel":         to_str(feat['tunnel']),
              "enable-remote-restart": to_str(feat['remote-restart']),
              "enable-record-session": to_str(feat['record-session']),
              "enable-block-input":    to_str(feat['block-input']),

              # Zusaetzliche Features aus bcrustdesk.json
              "enableKeyboard":        to_str(feat['keyboard']),
              "enableClipboard":       to_str(feat['clipboard']),
              "enableFileTransfer":    to_str(feat['file-transfer']),
              "enableAudio":           to_str(feat['audio']),
              "enableTCP":             to_str(feat['tunnel']),
              "enableRemoteRestart":   to_str(feat['remote-restart']),
              "enableRecording":       to_str(feat['record-session']),
              "enableBlockingInput":   to_str(feat['block-input']),
              "enablePrinter":         to_str(is_on(cfg.get('enablePrinter', 'on'))),
              "enableCamera":          to_str(is_on(cfg.get('enableCamera', 'on'))),
              "enableTerminal":        to_str(is_on(cfg.get('enableTerminal', 'on'))),

              # Patches (Generator-Schritte pruefen diese Env-Vars)
              "delayFix":              delay_fix,
              "hidecm":                to_str(hide_cm),
              "enableRemoteModi":      to_str(rmt_modi),
              "cycleMonitor":          to_str(cycle_mon),
              "xOffline":              to_str(x_offline),
              "removeNewVersionNotif": to_str(rm_notif),
              "removeWallpaper":       to_str(is_on(rm_wallp)),

              # Icon/Logo/Privacy-Links deaktiviert (kein rdgen-Server)
              "iconlink_url":           "false",
              "iconlink_file":          "false",
              "iconlink_uuid":          "false",
              "logolink_url":           "false",
              "logolink_file":          "false",
              "logolink_uuid":          "false",
              "privacylink_url":        "false",
              "privacylink_file":       "false",
              "privacylink_uuid":       "false",

              # rdgen-Interna
              "rdgen":   "standalone",
              "token":   "placeholder",
              "uuid":    "00000000-0000-0000-0000-000000000000",
              "custom":  custom_b64,
          }

          with open('secrets.json', 'w', encoding='utf-8') as f:
              json.dump(secrets_data, f, indent=2)

          print("secrets.json erstellt:")
          print(f"  App      : {app_name} ({filename})")
          print(f"  Server   : {server}")
          print(f"  Company  : {compname}")
          print(f"  Conn-Type: {conn_type}")
          print(f"  DelayFix : {delay_fix}")
          PYEOF

      - name: secrets.json AES-verschluesselt in ZIP verpacken
        env:
          ZIP_PASSWORD: ${{ secrets.ZIP_PASSWORD }}
        run: |
          python3 - <<'PYEOF'
          import pyzipper, os

          pwd = os.environ.get('ZIP_PASSWORD', '').strip()
          if not pwd:
              raise ValueError("GitHub Secret ZIP_PASSWORD ist nicht gesetzt!")

          with pyzipper.AESZipFile(
              'secrets.zip', 'w',
              compression=pyzipper.ZIP_LZMA,
              encryption=pyzipper.WZ_AES
          ) as zf:
              zf.setpassword(pwd.encode())
              zf.write('secrets.json', 'secrets.json')

          print("secrets.zip erstellt")
          PYEOF

      - name: Verschluesselte Config als Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: encrypted-secrets-zip
          path: secrets.zip
          retention-days: 1
