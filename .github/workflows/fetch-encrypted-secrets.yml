name: Generate Encrypted Config

# Ersetzt rdgens Original-Workflow.
# Liest Einstellungen aus rustdesk-config.yml und sensible Werte
# aus den Repository-Secrets. Erstellt daraus die verschlüsselte
# Config-ZIP, die die Generator-Workflows entschlüsseln.

on:
  workflow_call:
    inputs:
      zip_url_json:
        description: 'Wird ignoriert – Config kommt aus Repo und Secrets'
        required: false
        type: string
        default: ''

jobs:
  generate-config:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken (für rustdesk-config.yml)
        uses: actions/checkout@v4

      - name: Abhängigkeiten installieren
        run: pip install pyzipper pyyaml --quiet

      - name: secrets.json aus Config + Secrets generieren
        env:
          RUSTDESK_SERVER:   ${{ secrets.RUSTDESK_SERVER }}
          RUSTDESK_KEY:      ${{ secrets.RUSTDESK_KEY }}
          RUSTDESK_PASSWORD: ${{ secrets.RUSTDESK_PASSWORD }}
        run: |
          python3 - <<'PYEOF'
          import json, base64, os, yaml

          # ── Secrets (aus GitHub Secrets) ─────────────────────────
          server   = os.environ.get('RUSTDESK_SERVER', '').strip()
          key      = os.environ.get('RUSTDESK_KEY', '').strip()
          password = os.environ.get('RUSTDESK_PASSWORD', '').strip()

          if not server:
              raise ValueError("GitHub Secret RUSTDESK_SERVER ist nicht gesetzt!")
          if not password:
              raise ValueError("GitHub Secret RUSTDESK_PASSWORD ist nicht gesetzt!")

          # ── Einstellungen aus rustdesk-config.yml ─────────────────
          try:
              with open('rustdesk-config.yml', 'r', encoding='utf-8') as f:
                  cfg = yaml.safe_load(f)
          except FileNotFoundError:
              print("WARNUNG: rustdesk-config.yml nicht gefunden – Standardwerte werden verwendet")
              cfg = {}

          app   = cfg.get('app',        {})
          verb  = cfg.get('verbindung', {})
          sic   = cfg.get('sicherheit', {})
          funk  = cfg.get('funktionen', {})

          app_name  = str(app.get('name', 'RemoteSupport')).strip()
          theme     = str(app.get('theme', 'system'))
          dark      = 'Y' if app.get('allow_dark_theme', True) else 'N'
          filename  = app_name.lower().replace(' ', '-').replace('_', '-')

          conn_type   = str(verb.get('conn_type', 'Both'))
          direct_srv  = 'Y' if verb.get('direct_server', False) else 'N'
          auto_disc   = 'Y' if verb.get('auto_disconnect', False) else 'N'
          lan_disc    = 'Y' if verb.get('lan_discovery', True) else 'N'

          ver_method  = str(sic.get('verification_method', 'use-permanent-password'))
          access_mode = str(sic.get('access_mode', 'full'))

          def b(val, default=True):
              return bool(val) if val is not None else default

          api_server = f"https://{server}:21114"

          # ── Erweiterte Einstellungen (base64-JSON) ─────────────────
          custom = {
              "conn-type":             conn_type,
              "verification-method":   ver_method,
              "access-mode":           access_mode,
              "enable-lan-discovery":  lan_disc,
              "password":              password,
              "allow-auto-disconnect": auto_disc,
              "default-settings": {
                  "enable-keyboard":       b(funk.get('keyboard')),
                  "enable-clipboard":      b(funk.get('clipboard')),
                  "enable-file-transfer":  b(funk.get('file_transfer')),
                  "enable-audio":          b(funk.get('audio')),
                  "enable-tunnel":         b(funk.get('tunnel')),
                  "enable-remote-restart": b(funk.get('remote_restart')),
                  "enable-record-session": b(funk.get('record_session')),
                  "enable-block-input":    b(funk.get('block_input')),
              },
              "override-settings": {}
          }
          custom_b64 = base64.b64encode(json.dumps(custom).encode()).decode()

          # ── Vollständiges secrets.json ─────────────────────────────
          secrets_data = {
              "server":                server,
              "key":                   key,
              "apiServer":             api_server,
              "app-name":              app_name,
              "theme":                 theme,
              "allow-darktheme":       dark,
              "password":              password,
              "verification-method":   ver_method,
              "access-mode":           access_mode,
              "enable-lan-discovery":  lan_disc,
              "conn-type":             conn_type,
              "direct-server":         direct_srv,
              "allow-auto-disconnect": auto_disc,
              # "standalone" sorgt dafuer, dass rdgen/api-Upload-Schritte uebersprungen werden
              "rdgen":                 "standalone",
              "token":                 "placeholder",
              "uuid":                  "00000000-0000-0000-0000-000000000000",
              "filename":              filename,
              "custom":                custom_b64,
              "enable-keyboard":       str(b(funk.get('keyboard'))).lower(),
              "enable-clipboard":      str(b(funk.get('clipboard'))).lower(),
              "enable-file-transfer":  str(b(funk.get('file_transfer'))).lower(),
              "enable-audio":          str(b(funk.get('audio'))).lower(),
              "enable-tunnel":         str(b(funk.get('tunnel'))).lower(),
              "enable-remote-restart": str(b(funk.get('remote_restart'))).lower(),
              "enable-record-session": str(b(funk.get('record_session'))).lower(),
              "enable-block-input":    str(b(funk.get('block_input'))).lower(),
              # Privacy-Screen-Feature deaktivieren (kein rdgen-Server vorhanden)
              "privacylink_url":        "false",
              "privacylink_file":       "false",
              "privacylink_uuid":       "false",
          }

          with open('secrets.json', 'w', encoding='utf-8') as f:
              json.dump(secrets_data, f, indent=2)

          print(f"secrets.json erstellt")
          print(f"  App-Name : {app_name}")
          print(f"  Server   : {server}")
          print(f"  Dateiname: {filename}")
          PYEOF

      - name: secrets.json AES-verschluesselt in ZIP verpacken
        env:
          ZIP_PASSWORD: ${{ secrets.ZIP_PASSWORD }}
        run: |
          python3 - <<'PYEOF'
          import pyzipper, os

          pwd = os.environ.get('ZIP_PASSWORD', '').strip()
          if not pwd:
              raise ValueError("GitHub Secret ZIP_PASSWORD ist nicht gesetzt!")

          with pyzipper.AESZipFile(
              'secrets.zip', 'w',
              compression=pyzipper.ZIP_LZMA,
              encryption=pyzipper.WZ_AES
          ) as zf:
              zf.setpassword(pwd.encode())
              zf.write('secrets.json', 'secrets.json')

          print("secrets.zip erstellt und verschluesselt")
          PYEOF

      - name: Verschluesselte Config als Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: encrypted-secrets-zip
          path: secrets.zip
          retention-days: 1
